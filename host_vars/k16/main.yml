# k16 上で ansible-playbook を直接実行する想定 (制御ノード = ターゲット)。
# 別マシンから ssh で k16 を操作したい場合は、コマンド側で
# `-e ansible_connection=ssh -e ansible_user=dobachi` を渡して上書きする。
ansible_connection: local
ansible_python_interpreter: /usr/bin/python3

# --- 遠隔操作: VNC へ移行 (旧 RDP/gnome_screen_share は休眠) -------------
# 経緯:
#   - 3389 (Desktop Sharing) は物理ログイン中前提で、物理ディスプレイ未接続
#     だと GDM がログインしてくれず使えない
#   - 3390 (Remote Login) は新規 GNOME セッションを spawn するが、物理ログイン
#     中の dobachi セッションがあると "既存セッションをログアウトする" 警告で
#     接続不可 (GDM/logind の 1 ユーザー 1 セッション制約)
#   - force_virtual_display: true で kernel cmdline に video=HDMI-A-1:... を
#     入れる対処は、物理モニタ再接続時に EDID を上書きして縦横比を破壊する
# よって RDP は休眠させ、Xvnc + Xfce4 の独立デスクトップ (VNC) に切替える。
# パッケージや grdctl 設定はそのまま残し、systemd unit だけ停止する。
gnome_screen_share_rdp_username: "dobachi"
gnome_screen_share_rdp_password: "{{ vault_gnome_rdp_password }}"
gnome_screen_share_force_virtual_display: false
gnome_screen_share_user_unit_enabled: false
gnome_screen_share_user_unit_state: "stopped"
gnome_screen_share_system_unit_enabled: false
gnome_screen_share_system_unit_state: "stopped"

# --- VNC (TigerVNC standalone + Xfce4, port 5901) ----------------------
# Wayland 専用の GNOME と完全に独立した Xvnc セッションを :1 に常駐させる。
# 物理 HDMI 接続/未接続の状態に依存しない。Tailscale subnet からのみ allow。
# パスワードは host_vars/k16/vault.yml で Vault 化:
#   ansible-vault encrypt_string 'StrongPassword' \
#     --name 'vault_vnc_password' >> host_vars/k16/vault.yml
vnc_server_enable: true
vnc_server_user: "dobachi"
vnc_server_password: "{{ vault_vnc_password }}"

rclone_sharepoint_enable: true
rclone_sharepoint_remote_name: "dobachi-private"

# --- ローカル AI 環境 (docs/hermes.md) ----------------------------------
# Hermes Agent + llama-server (Vulkan / AMD iGPU = Radeon 680M)。
# Qwen2.5-Coder-7B (Q4_K_M / 4.7 GB) は coding 補完は速いが tool-use 出力が
# `<tool_call>` タグでなく markdown コードブロックになり、write_file 等が
# 一切実行されない症状を踏んだ。Nous Research 自身が Hermes Agent に整合
# させて出している Hermes-3 Llama-3.1 8B (Q4_K_M / 4.9 GB) に差し替えて
# 検証中。
# Llama-3.1 は native 128K context なので Hermes Agent の 64K 要件は
# RoPE 延長無しで満たせる (llama_server_deb_ctx_size: 65536 のまま)。
llama_server_deb_hf_repo: "bartowski/Hermes-3-Llama-3.1-8B-GGUF"
llama_server_deb_hf_file: "Hermes-3-Llama-3.1-8B-Q4_K_M.gguf"
llama_server_deb_model_alias: "hermes-3-llama-3.1-8b"

# Hermes 側の参照モデル名を llama-server の alias と揃える。
hermes_agent_local_model_name: "hermes-3-llama-3.1-8b"

# Hermes-3 の GGUF は default で素 ChatML (tool-use 用 jinja は別 entry に
# 入っている) のため、llama-server が `<tools>` をシステムプロンプトに焼かず
# tool-call が発火しない。tokenizer_config.json から抜いた `tool_use` template
# を /etc/llama-server-hermes3-tool_use.j2 に配置し、--chat-template-file で
# 明示する。
llama_server_deb_chat_template_src: "chat-template-hermes3-tool_use.j2"
llama_server_deb_chat_template_file: "/etc/llama-server-hermes3-tool_use.j2"

# k16 はメインの開発機。llama-server を boot 時に勝手に立ち上げず、
# 必要なときだけ `sudo systemctl start llama-server` で手動制御する運用。
# ansible は設定反映のみ行い、systemd unit は disable + (現状) stopped を保つ。
llama_server_deb_unit_enabled: false
llama_server_deb_unit_state: "stopped"

# Radeon 680M (iGPU) は GTT 経由の大きな KV キャッシュ dispatch で
# GPU compute ring timeout → DeviceLostError になる。
# flash attention で attention 計算量を削減し、KV を q8_0 に量子化して
# メモリ帯域を半減させることでタイムアウトを回避する。
llama_server_deb_extra_env:
  LLAMA_ARG_FLASH_ATTN: "1"
  LLAMA_ARG_CACHE_TYPE_K: "q8_0"
  LLAMA_ARG_CACHE_TYPE_V: "q8_0"

