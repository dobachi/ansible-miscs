# k16 上で ansible-playbook を直接実行する想定 (制御ノード = ターゲット)。
# 別マシンから ssh で k16 を操作したい場合は、コマンド側で
# `-e ansible_connection=ssh -e ansible_user=dobachi` を渡して上書きする。
ansible_connection: local
ansible_python_interpreter: /usr/bin/python3

# --- 遠隔操作: VNC へ移行 (旧 RDP/gnome_screen_share は休眠) -------------
# 経緯:
#   - 3389 (Desktop Sharing) は物理ログイン中前提で、物理ディスプレイ未接続
#     だと GDM がログインしてくれず使えない
#   - 3390 (Remote Login) は新規 GNOME セッションを spawn するが、物理ログイン
#     中の dobachi セッションがあると "既存セッションをログアウトする" 警告で
#     接続不可 (GDM/logind の 1 ユーザー 1 セッション制約)
#   - force_virtual_display: true で kernel cmdline に video=HDMI-A-1:... を
#     入れる対処は、物理モニタ再接続時に EDID を上書きして縦横比を破壊する
# よって RDP は休眠させ、Xvnc + Xfce4 の独立デスクトップ (VNC) に切替える。
# パッケージや grdctl 設定はそのまま残し、systemd unit だけ停止する。
gnome_screen_share_rdp_username: "dobachi"
gnome_screen_share_rdp_password: "{{ vault_gnome_rdp_password }}"
gnome_screen_share_force_virtual_display: false
gnome_screen_share_user_unit_enabled: false
gnome_screen_share_user_unit_state: "stopped"
gnome_screen_share_system_unit_enabled: false
gnome_screen_share_system_unit_state: "stopped"

# --- VNC (TigerVNC standalone + Xfce4, port 5901) ----------------------
# Wayland 専用の GNOME と完全に独立した Xvnc セッションを :1 に常駐させる。
# 物理 HDMI 接続/未接続の状態に依存しない。Tailscale subnet からのみ allow。
# パスワードは host_vars/k16/vault.yml で Vault 化:
#   ansible-vault encrypt_string 'StrongPassword' \
#     --name 'vault_vnc_password' >> host_vars/k16/vault.yml
vnc_server_enable: true
vnc_server_user: "dobachi"
vnc_server_password: "{{ vault_vnc_password }}"

rclone_sharepoint_enable: true
rclone_sharepoint_remote_name: "dobachi-private"

# --- Docker (Hermes Agent の隔離実行基盤 + 一般用途) --------------------
# roles/hermes_agent が nousresearch/hermes-agent container を叩けるように
# docker.service を確実に enable + dobachi を docker group に入れる。
docker_enable: true
docker_users: ["dobachi"]

# --- Hermes Agent (Docker sandboxed, OpenRouter primary) ---------------
# エージェント本体は nousresearch/hermes-agent container 内で走らせる。
# host からは以下の2ディレクトリだけを bind mount で見せる:
#   ~/hermes-workspace → /workspace  (触らせたいファイルはここに置く)
#   ~/.hermes          → /opt/data   (config, API key, sessions)
# file tool も terminal tool も上記 2 ディレクトリの外を触れない。
#
# ローカル llama-server / amdgpu_gtt は休眠 (defaults の enable:false のまま)。
# Hermes は OpenRouter primary で Anthropic / Qwen3 / DeepSeek 等を経由。
#
# OPENROUTER_API_KEY は host_vars/k16/vault.yml で Vault 化:
#   ansible-vault encrypt_string 'sk-or-v1-...' \
#     --name 'vault_hermes_openrouter_api_key' >> host_vars/k16/vault.yml
hermes_agent_openrouter_model: "anthropic/claude-sonnet-4.5"
hermes_agent_openrouter_api_key: "{{ vault_hermes_openrouter_api_key }}"

# 触らせるディレクトリ (default: ~/.hermes/workspace)。
# HERMES_HOME 配下に統合しているので dashboard から可視化される。
# 別ディレクトリに分離したい場合は host_vars で "~/hermes-workspace" 等に上書き。
# hermes_agent_workspace: "~/.hermes/workspace"
# 初期化しておきたいサブディレクトリ (作業カテゴリ分けする場合)
# hermes_agent_workspace_subdirs: [projects, sandbox, scratch]

# --- Hermes dashboard を Tailscale 経由で公開 ---------------------------
# k16 の Tailscale IP は 100.64.0.1 (`tailscale ip -4` で確認)。
# Tailscale ACL + Basic auth の 2 段防御。
# password は host_vars/k16/vault.yml で Vault 化:
#   ansible-vault encrypt_string 'STRONG_PASSWORD' \
#     --name 'vault_hermes_dashboard_password' >> host_vars/k16/vault.yml
hermes_agent_dashboard_enable: true
hermes_agent_dashboard_bind: "100.64.0.1"
hermes_agent_dashboard_basic_auth_username: "dobachi"
hermes_agent_dashboard_basic_auth_password: "{{ vault_hermes_dashboard_password }}"

