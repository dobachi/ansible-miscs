---
# defaults file for roles/hermes_agent
#
# Hermes Agent (Nous Research) を **Docker container 版** として per-user 導入する。
#
# 隔離モデル (docs/hermes.md 参照):
#   - エージェント本体 (venv, Node, Playwright, file/terminal/browser tools) は
#     nousresearch/hermes-agent:latest container の内側で走る。
#   - host 側で container に見せるのは以下の2ディレクトリだけ:
#       {{ hermes_agent_workspace }} → /workspace   (作業用固定ディレクトリ)
#       ~/.hermes                    → /opt/data    (config, API key, sessions)
#   - file tool は container 内の /workspace と /opt/data 以外書き込み不可
#     (rootfs は image layer で immutable)。
#   - terminal tool も同 container 内で走るので、`rm -rf ~` 系の host 破壊が
#     起きない。
#   - $PWD 依存ではなく **専用ワークスペース固定**: hermes を $HOME から誤って
#     叩いても ~/.ssh 等を container に見せる事故が起きない。触らせたいファイル
#     は workspace 配下に置く運用。

# このロール本体を実行するかのスイッチ。
hermes_agent_enable: false

# Hermes を入れる対象ユーザー (~/.hermes 配下に config が展開される)。
# become 前の実行ユーザーを推定する。ansible_user_id (become 後の root) は使わない。
hermes_agent_user: >-
  {{ ansible_facts['env']['SUDO_USER']
     | default(ansible_user, true)
     | default(lookup('env', 'USER'), true) }}

# 公式 Docker image。tag は :latest 固定でも構わないが、pinning したい場合は
# host_vars で `nousresearch/hermes-agent:0.18.2` のように渡す。
hermes_agent_image: "nousresearch/hermes-agent:latest"

# Hermes container が /workspace として bind mount する host 側ディレクトリ。
# ユーザーが Hermes に触らせたいファイルはここに置く / clone / cp する。
# 絶対パスまたは ~ で始まるパスを受け付ける (ロール内で展開)。
# 一時的に別ディレクトリを使いたい場合はラッパー起動時に環境変数で上書き:
#   HERMES_WORKSPACE=/tmp/other-dir hermes
hermes_agent_workspace: "~/hermes-workspace"

# ワークスペース内に事前に掘っておくサブディレクトリ (作業カテゴリ分けする場合)。
# 例: hermes_agent_workspace_subdirs: [projects, sandbox, scratch]
# 空 list ならワークスペースルートだけを 0700 で作成する。
hermes_agent_workspace_subdirs: []

# ラッパースクリプトの設置先 (per-user)。~/.local/bin は PATH に入っている
# 前提 (Ubuntu 26.04 の default .profile が自動追加)。
hermes_agent_launcher_dir: "~/.local/bin"

# ラッパースクリプト名。既定 "hermes" にしておくと従来の CLI muscle memory を
# そのまま活かせる (host 直インストール版は uninstall 済み前提)。
# 「sandbox 経由と明示したい」なら hermes_agent_launcher_name: hermes-sb 等。
hermes_agent_launcher_name: "hermes"

# docker run に追加で渡したい引数 (list of strings)。
# 例:
#   - "--network=host"       # container から host の 8080 llama-server を叩く場合
#   - "--memory=16g"
# 既定の bind mount (workspace + ~/.hermes) と UID/GID forwarding は自動。
hermes_agent_extra_docker_args: []

# --- OpenRouter provider 設定 -------------------------------------------
# provider: openrouter は Hermes の first-class provider (HermesOverlay 登録済み)。
# API key は ~/.hermes/.env の OPENROUTER_API_KEY を container から
# /opt/data/.env として拾う。

# OpenRouter で primary として使うモデル ID (OpenRouter canonical slug)。
hermes_agent_openrouter_model: "anthropic/claude-sonnet-4.5"

# OPENROUTER_API_KEY。空文字列だと ~/.hermes/.env への書き込みを skip する。
# 標準運用: host_vars で `{{ vault_hermes_openrouter_api_key }}` を渡す。
hermes_agent_openrouter_api_key: ""

# 既存の ~/.hermes/config.yaml をロールのテンプレで強制上書きするか。
hermes_agent_reset_config: false
