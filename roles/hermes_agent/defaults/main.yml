---
# defaults file for roles/hermes_agent
#
# Hermes Agent (Nous Research) を per-user CLI として導入し、
# OpenRouter primary で ~/.hermes/config.yaml と ~/.hermes/.env を配置する。
#
# 方針:
#   - Hermes Agent 公式の一次推奨は Nous Portal / OpenRouter などクラウド provider。
#   - OpenRouter は Hermes の first-class provider (hermes_cli/providers.py:47 に
#     HermesOverlay 登録) で、200+ モデルを単一 API key で選択できる。
#   - Nous 自身が Hermes-3 / Hermes-4 を "NOT agentic" と警告している
#     (hermes_cli/model_switch.py:53-58)。ローカル自前推論は非標準扱いなので、
#     このロールでは OpenRouter primary に振り、ローカル LLM (llama_server_deb /
#     amdgpu_gtt) はロール分離済み (呼び出し側で opt-in) のまま扱う。
#
# 認証情報 (OPENROUTER_API_KEY) は Vault で暗号化した上で
# hermes_agent_openrouter_api_key に渡す想定。ロール側は ~/.hermes/.env に
# 書き出し、no_log:true でログから伏せる。

# このロール本体を実行するかのスイッチ。
hermes_agent_enable: false

# Hermes を入れる対象ユーザー (~/.hermes 配下に展開される)。
#
# 優先順位:
#   1. SUDO_USER 環境変数 (`sudo ansible-playbook ...` で実行した場合)
#   2. ansible_user (SSH 接続/connection plugin のユーザー、become 前)
#   3. lookup('env', 'USER') (制御ノード側、ansible_user も無い localhost ケース)
# `ansible_user_id` は使わない — become: true 下で 'root' に化けて
# /root/.hermes/ に書かれる事故になるため。
hermes_agent_user: >-
  {{ ansible_facts['env']['SUDO_USER']
     | default(ansible_user, true)
     | default(lookup('env', 'USER'), true) }}

# Hermes 公式 per-user インストーラ URL。
hermes_agent_installer_url: "https://hermes-agent.nousresearch.com/install.sh"

# Hermes が依存する OS パッケージを apt で導入するか。
hermes_agent_install_apt_deps: true
# Ubuntu 26.04 の `nodejs` パッケージは `npm` を内包して `Conflicts: npm` を
# 宣言しているため、apt の `npm` を別途要求するとトランザクションが壊れる。
# `nodejs` をインストールすれば `npm` バイナリも一緒に入るので `npm` は列挙しない。
hermes_agent_apt_deps:
  - curl
  - ca-certificates
  - ripgrep
  - ffmpeg
  - nodejs

# --- OpenRouter provider 設定 -------------------------------------------
# OpenRouter は provider: openrouter で first-class 扱い。
# base_url は overlay に登録済みなので config.yaml に書かなくても解決する。
# API key は ~/.hermes/.env の OPENROUTER_API_KEY を Hermes が拾う。

# OpenRouter で primary として使うモデル ID。
# 推奨: 明確に agentic (tool-calling 訓練済み) なモデルを指定する。
#   - anthropic/claude-sonnet-4.5   (Hermes docs 一次推奨クラス)
#   - anthropic/claude-haiku-4-5    (廉価)
#   - qwen/qwen3-coder              (Hermes curated: Qwen3 系)
#   - deepseek/deepseek-v3.2        (Hermes curated)
# OpenRouter 側の正式 slug に合わせる (https://openrouter.ai/models 参照)。
hermes_agent_openrouter_model: "anthropic/claude-sonnet-4.5"

# OPENROUTER_API_KEY。空文字列だと ~/.hermes/.env への書き込みを skip する
# (この場合はユーザーが後で `hermes config set OPENROUTER_API_KEY sk-or-...`
# か手動で ~/.hermes/.env を編集する)。
# host_vars 側で Vault 化した値を渡すのが標準運用:
#   hermes_agent_openrouter_api_key: "{{ vault_hermes_openrouter_api_key }}"
hermes_agent_openrouter_api_key: ""

# 既存の ~/.hermes/config.yaml をロールのテンプレで強制上書きするか。
#   false (既定): force:false 動作。既存ファイルは触らない (CLI/手書き修正を保持)
#   true        : テンプレを反映するため上書き (元ファイルは backup: で .~ 退避)
hermes_agent_reset_config: false
