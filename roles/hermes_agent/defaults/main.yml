---
# defaults file for roles/hermes_agent
#
# Hermes Agent (Nous Research) を per-user CLI として導入し、
# ~/.hermes/config.yaml を配置するロール。
#
# 認証情報 (Anthropic API key / OAuth トークン) はここでは扱わない:
#   - `hermes setup` を対話で走らせる、または
#   - ANTHROPIC_API_KEY を ~/.bashrc 等に export
# のどちらかをロール実行後に手で行う。

# このロール本体を実行するかのスイッチ。
hermes_agent_enable: false

# Hermes を入れる対象ユーザー (~/.hermes 配下に展開される)。
#
# 優先順位:
#   1. SUDO_USER 環境変数 (`sudo ansible-playbook ...` で実行した場合)
#   2. ansible_user (SSH 接続/connection plugin のユーザー、become 前)
#   3. lookup('env', 'USER') (制御ノード側、ansible_user も無い localhost ケース)
# `ansible_user_id` は使わない — become: true 下で 'root' に化けて
# /root/.hermes/ に書かれる事故になるため。
# 別ユーザーに入れたいなら playbook / extra-vars で明示的に上書きする。
hermes_agent_user: >-
  {{ ansible_facts['env']['SUDO_USER']
     | default(ansible_user, true)
     | default(lookup('env', 'USER'), true) }}

# Hermes 公式 per-user インストーラ URL。
# 中身は curl | bash 流の installer で、~/.hermes/hermes-agent/ に
# venv を作ってその中に hermes CLI を入れる。sudo は要求しない
# (依存パッケージは下の hermes_agent_apt_deps で事前に揃える前提)。
hermes_agent_installer_url: "https://hermes-agent.nousresearch.com/install.sh"

# Hermes が依存する OS パッケージを apt で導入するか。
# 既存ホストで揃ってる前提なら false にしてスキップしても良い。
hermes_agent_install_apt_deps: true
# Ubuntu 26.04 の `nodejs` パッケージは `npm` を内包して `Conflicts: npm` を
# 宣言しているため、apt の `npm` を別途要求するとトランザクションが壊れる
# (nodesource など他経路で nodejs が入っている環境でも同様)。
# `nodejs` をインストールすれば `npm` バイナリも一緒に入るので、ここでは
# `npm` を列挙しない。
hermes_agent_apt_deps:
  - curl
  - ca-certificates
  - ripgrep
  - ffmpeg
  - nodejs

# --- Hermes config.yaml 生成パラメータ -----------------------------------
# Hermes 0.16.0 (config v27) は Custom OpenAI 互換エンドポイントを `model:`
# ブロックに直接 base_url/api_key 埋め込む形で登録する。本ロールはローカル
# LLM (`roles/llama_server_deb` の llama-server) を default にして初期 bootstrap
# する。Anthropic Claude を主脳にしたい場合は ansible 後に `hermes setup` で
# OAuth/API key を入れる (template モジュールは `force: false` 運用)。

# ローカル LLM の OpenAI 互換 base URL。
hermes_agent_local_base_url: "http://127.0.0.1:8080/v1"

# 上記ローカル base_url が公開する model id。
# roles/llama_server_deb の llama_server_deb_model_alias と揃える。
hermes_agent_local_model_name: "qwen2.5-coder-14b"

# Hermes Agent の最小要件は 64K context。Qwen2.5-Coder の n_ctx_train は
# 32768 なので、llama-server 側で --ctx-size 65536 にして RoPE 延長し、
# Hermes 側にも context_length を明示しないと「ctx 不足」で起動拒否される。
hermes_agent_local_context_length: 65536

# 認証不要なローカル LLM 向けダミー API key。Hermes は値を要求するが
# llama-server 側はチェックしないので任意の文字列で良い。
hermes_agent_local_api_key: "dummy"

# 既存の ~/.hermes/config.yaml をロールのテンプレで強制上書きするか。
#   false (既定): force:false 動作。既存ファイルは触らない (CLI/手書き修正を保持)
#   true        : テンプレを反映するため上書き (元ファイルは backup: で .~ 退避)
# テンプレ側を変えた直後にだけ `-e hermes_agent_reset_config=true` で渡す想定。
hermes_agent_reset_config: false
