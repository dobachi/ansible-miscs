---
# defaults file for roles/hermes_agent
#
# Hermes Agent (Nous Research) を **Docker gateway モード** で常駐させる。
#
# アーキテクチャ
# --------------
#   [Host]                            [container: nousresearch/hermes-agent]
#   systemd unit ── docker run ────>  hermes gateway run (long-lived)
#                                       ├─ curator (24/7 skill 保守)
#                                       ├─ dashboard (opt-in, 127.0.0.1:9119)
#                                       ├─ messaging gateway (opt-in)
#                                       └─ hermes CLI (docker exec で attach)
#
#   ~/hermes-workspace  ── bind mount ──→  /workspace   (WORKDIR)
#   ~/.hermes           ── bind mount ──→  /opt/data    (config, .env, skills, memories, sessions)
#
# ephemeral (--rm) モードとの違い:
#   - 常駐 container なので curator / skill 学習 / user model が 24/7 で動く
#   - ~/.local/bin/hermes は `docker exec` で container に潜って hermes CLI を叩く
#   - ~/.local/bin/hermes-shell は container 内 bash に落ちる (デバッグ/検査用)
#
# 隔離モデルは ephemeral 版と同じ:
#   - file / terminal / browser tool は container 内で走り、bind mount した
#     2 ディレクトリの外を触れない (rootfs は image layer、他 host FS は不可視)

# このロール本体を実行するかのスイッチ。
hermes_agent_enable: false

# Hermes を入れる対象ユーザー (~/.hermes 配下 + workspace を所有)。
hermes_agent_user: >-
  {{ ansible_facts['env']['SUDO_USER']
     | default(ansible_user, true)
     | default(lookup('env', 'USER'), true) }}

# 公式 Docker image。tag pinning したければ host_vars で上書き。
hermes_agent_image: "nousresearch/hermes-agent:latest"

# 常駐 container の名前。docker exec のターゲット。
# 変えるなら、~/.local/bin/hermes ラッパーも同じ名前を参照するよう
# 環境変数 HERMES_CONTAINER=... を export しておくこと。
hermes_agent_container_name: "hermes"

# container が /workspace として bind mount する host 側ディレクトリ。
# 触らせたいファイルはここに置く / clone する。
hermes_agent_workspace: "~/hermes-workspace"

# workspace 配下に事前に掘っておくサブディレクトリ (空 list なら root だけ作成)。
hermes_agent_workspace_subdirs: []

# ラッパー / helper の設置先。
hermes_agent_launcher_dir: "~/.local/bin"

# メイン CLI ラッパー名 (docker exec 経由で container 内 hermes を叩く)。
hermes_agent_launcher_name: "hermes"

# bash shell helper 名 (docker exec 経由で container 内 bash に落ちる)。
hermes_agent_shell_helper_name: "hermes-shell"

# gateway systemd unit のファイル名 (拡張子込み)。
hermes_agent_systemd_unit_name: "hermes-gateway.service"

# systemd unit を boot 時に auto-start するか。false にすると
# `sudo systemctl start hermes-gateway` で手動制御する運用。
hermes_agent_systemd_unit_enabled: true

# ansible 実行完了時点で container を起動するか (started / stopped / restarted)。
hermes_agent_systemd_unit_state: "started"

# --- Optional 公開ポート -------------------------------------------------
# いずれも 127.0.0.1 (localhost) にだけ bind する。
# LAN からアクセスしたい場合は SSH tunnel か reverse proxy を挟むこと。

# 内蔵 dashboard を有効化するか。true の場合、systemd unit の docker run に
# `-p {{ bind }}:{{ port }}:{{ port }}` と HERMES_DASHBOARD=1 が加わる。
hermes_agent_dashboard_enable: false
hermes_agent_dashboard_port: 9119

# dashboard を公開する host 側 IP。
#   "127.0.0.1"  : localhost のみ (SSH tunnel 前提)
#   Tailscale IP : mesh 内からアクセス可 (Basic auth 必須)
#   "0.0.0.0"    : 全 interface (絶対に非推奨、警告あり)
# 参考: k16 の Tailscale IP は `tailscale ip -4` で確認。
hermes_agent_dashboard_bind: "127.0.0.1"

# Basic auth (非 loopback bind の場合は必須)。
# Hermes 2026-06 hardening 以降、非 loopback bind には
# DashboardAuthProvider が必要 (HERMES_DASHBOARD_INSECURE は無効化済み)。
# 空文字列だと Basic auth 未設定として扱う。
hermes_agent_dashboard_basic_auth_username: ""
hermes_agent_dashboard_basic_auth_password: ""

# OpenAI 互換 API server を 127.0.0.1:8642 で公開するか。
# 有効にする場合、hermes_agent_api_server_key を Vault で必ず設定すること
# (キー無し公開は Hermes 側で拒否される)。
hermes_agent_api_server_enable: false
hermes_agent_api_server_port: 8642
hermes_agent_api_server_key: ""

# docker run に追加で渡したい引数 (list of strings)。
# 例:
#   - "--memory=16g"
#   - "--cpus=4"
# 既定の bind mount / port 公開 / restart policy は自動。
hermes_agent_extra_docker_args: []

# --- OpenRouter provider 設定 -------------------------------------------
hermes_agent_openrouter_model: "anthropic/claude-sonnet-4.5"
hermes_agent_openrouter_api_key: ""

# 既存の ~/.hermes/config.yaml をロールのテンプレで強制上書きするか。
hermes_agent_reset_config: false
