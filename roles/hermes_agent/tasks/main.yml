---
# tasks file for roles/hermes_agent
#
# Hermes Agent CLI を Docker gateway モードで常駐させる。
#   - /etc/systemd/system/{{ hermes_agent_systemd_unit_name }} を配置
#   - docker run --name {{ hermes_agent_container_name }} で long-lived container
#   - ~/.local/bin/{{ hermes_agent_launcher_name }} は docker exec ラッパー
#   - ~/.local/bin/{{ hermes_agent_shell_helper_name }} は container 内 bash に落ちる helper
#
# 前提:
#   - Docker Engine が動作中 (roles/docker で導入済み想定)
#   - hermes_agent_user が docker グループに所属 (roles/docker の docker_users)
#   - OPENROUTER_API_KEY を Vault 化した値で hermes_agent_openrouter_api_key に渡す

- block:

    # ---------- pre-flight ----------

    - name: Look up passwd entry of hermes_agent_user
      ansible.builtin.getent:
        database: passwd
        key: "{{ hermes_agent_user }}"

    - name: Set facts for hermes_agent_user home / UID / GID
      ansible.builtin.set_fact:
        _hermes_agent_home: "{{ getent_passwd[hermes_agent_user][4] }}"
        _hermes_agent_uid: "{{ getent_passwd[hermes_agent_user][1] }}"
        _hermes_agent_gid: "{{ getent_passwd[hermes_agent_user][2] }}"

    - name: Expand ~ in hermes_agent_workspace
      ansible.builtin.set_fact:
        _hermes_agent_workspace: >-
          {{ hermes_agent_workspace
             | regex_replace('^~', _hermes_agent_home) }}

    - name: Expand ~ in hermes_agent_launcher_dir
      ansible.builtin.set_fact:
        _hermes_agent_launcher_dir: >-
          {{ hermes_agent_launcher_dir
             | regex_replace('^~', _hermes_agent_home) }}

    - name: Assert Docker Engine is running
      ansible.builtin.systemd:
        name: docker
      register: _hermes_agent_docker_status
      failed_when:
        - _hermes_agent_docker_status.status.ActiveState is defined
        - _hermes_agent_docker_status.status.ActiveState != "active"

    # /etc/group を読むだけでは「login shell が docker group を activate 済みか」
    # がわからない (usermod 後にログアウトしていないと反映されない)。
    # `sudo -u <user> docker version` で fresh 子プロセスで実接続を試す。
    - name: Assert hermes_agent_user can talk to Docker daemon (fresh subprocess)
      ansible.builtin.command:
        cmd: docker version --format json
      become: true
      become_user: "{{ hermes_agent_user }}"
      register: _hermes_agent_docker_probe
      changed_when: false
      failed_when: _hermes_agent_docker_probe.rc != 0
      # 失敗ケースの典型:
      #   1) usermod -aG docker した直後で既存 login session に反映されてない
      #      → newgrp docker or 再ログイン
      #   2) docker.sock の group が 'docker' ではない
      #      → getent group docker で確認

    - name: Assert API server key is set when API server is enabled
      ansible.builtin.assert:
        that:
          - hermes_agent_api_server_key | length > 0
        fail_msg: >-
          hermes_agent_api_server_enable=true の場合、
          hermes_agent_api_server_key を必ず設定してください
          (Hermes は key 無しの API server 起動を拒否します)。
      when: hermes_agent_api_server_enable | bool

    # ---------- image ----------

    - name: Pull Hermes Agent Docker image
      community.docker.docker_image:
        name: "{{ hermes_agent_image }}"
        source: pull
        force_source: false
      become: true
      become_user: "{{ hermes_agent_user }}"

    # ---------- workspace ----------

    - name: Ensure workspace root directory exists (0700)
      ansible.builtin.file:
        path: "{{ _hermes_agent_workspace }}"
        state: directory
        owner: "{{ hermes_agent_user }}"
        group: "{{ hermes_agent_user }}"
        mode: "0700"

    - name: Ensure workspace subdirectories exist
      ansible.builtin.file:
        path: "{{ _hermes_agent_workspace }}/{{ item }}"
        state: directory
        owner: "{{ hermes_agent_user }}"
        group: "{{ hermes_agent_user }}"
        mode: "0700"
      loop: "{{ hermes_agent_workspace_subdirs }}"
      when: hermes_agent_workspace_subdirs | length > 0

    # ---------- ~/.hermes (host data volume) ----------

    - name: Ensure ~/.hermes directory exists (0700)
      ansible.builtin.file:
        path: "{{ _hermes_agent_home }}/.hermes"
        state: directory
        owner: "{{ hermes_agent_user }}"
        group: "{{ hermes_agent_user }}"
        mode: "0700"

    - name: Ensure ~/.hermes/.env exists with restrictive perms
      ansible.builtin.file:
        path: "{{ _hermes_agent_home }}/.hermes/.env"
        state: touch
        owner: "{{ hermes_agent_user }}"
        group: "{{ hermes_agent_user }}"
        mode: "0600"
        modification_time: preserve
        access_time: preserve

    - name: Write OPENROUTER_API_KEY to ~/.hermes/.env
      ansible.builtin.lineinfile:
        path: "{{ _hermes_agent_home }}/.hermes/.env"
        regexp: '^OPENROUTER_API_KEY='
        line: "OPENROUTER_API_KEY={{ hermes_agent_openrouter_api_key }}"
        owner: "{{ hermes_agent_user }}"
        group: "{{ hermes_agent_user }}"
        mode: "0600"
        create: true
      no_log: true
      when: hermes_agent_openrouter_api_key | length > 0

    - name: Bootstrap ~/.hermes/config.yaml (force toggled by hermes_agent_reset_config)
      ansible.builtin.template:
        src: hermes-config.yaml.j2
        dest: "{{ _hermes_agent_home }}/.hermes/config.yaml"
        owner: "{{ hermes_agent_user }}"
        group: "{{ hermes_agent_user }}"
        mode: "0600"
        force: "{{ hermes_agent_reset_config | bool }}"
        backup: true

    # ---------- systemd unit (gateway container 常駐) ----------

    - name: Deploy hermes-gateway systemd unit
      ansible.builtin.template:
        src: hermes-gateway.service.j2
        dest: "/etc/systemd/system/{{ hermes_agent_systemd_unit_name }}"
        owner: root
        group: root
        mode: "0644"
      notify: reload systemd and restart hermes-gateway

    - name: Reload systemd if unit changed
      ansible.builtin.meta: flush_handlers

    - name: Enable + start hermes-gateway service
      ansible.builtin.systemd:
        name: "{{ hermes_agent_systemd_unit_name }}"
        enabled: "{{ hermes_agent_systemd_unit_enabled | bool }}"
        state: "{{ hermes_agent_systemd_unit_state }}"
        daemon_reload: true

    # ---------- user-side helpers (~/.local/bin/*) ----------

    - name: Ensure launcher directory exists
      ansible.builtin.file:
        path: "{{ _hermes_agent_launcher_dir }}"
        state: directory
        owner: "{{ hermes_agent_user }}"
        group: "{{ hermes_agent_user }}"
        mode: "0755"

    - name: Deploy hermes CLI attach launcher (docker exec)
      ansible.builtin.template:
        src: hermes-launcher.sh.j2
        dest: "{{ _hermes_agent_launcher_dir }}/{{ hermes_agent_launcher_name }}"
        owner: "{{ hermes_agent_user }}"
        group: "{{ hermes_agent_user }}"
        mode: "0755"

    - name: Deploy hermes-shell helper (docker exec bash)
      ansible.builtin.template:
        src: hermes-shell.sh.j2
        dest: "{{ _hermes_agent_launcher_dir }}/{{ hermes_agent_shell_helper_name }}"
        owner: "{{ hermes_agent_user }}"
        group: "{{ hermes_agent_user }}"
        mode: "0755"

    - name: Post-install reminders
      ansible.builtin.debug:
        msg:
          - "=== Hermes Agent (gateway mode) 構築完了 ==="
          - "Container : {{ hermes_agent_container_name }} (systemd unit: {{ hermes_agent_systemd_unit_name }})"
          - "Workspace : {{ _hermes_agent_workspace }}"
          - "Image     : {{ hermes_agent_image }}"
          - ""
          - "1. サービス状態: `systemctl status {{ hermes_agent_systemd_unit_name }}`"
          - "2. 対話開始   : `{{ hermes_agent_launcher_name }}`"
          - "3. 内部 shell : `{{ hermes_agent_shell_helper_name }}` (container 内 bash)"
          - "4. 触らせるファイルは workspace に置く"

  tags:
    - hermes_agent
  when:
    - ansible_facts['os_family'] == "Debian"
    - hermes_agent_enable | bool

# vim: set et ts=2 sw=2:
