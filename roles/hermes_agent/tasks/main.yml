---
# tasks file for roles/hermes_agent
#
# Hermes Agent CLI を hermes_agent_user の home に per-user で入れて、
# ~/.hermes/config.yaml をテンプレから配置する。
# OPENROUTER_API_KEY は ~/.hermes/.env に書き込む (Vault で暗号化した値を渡す想定)。
#
# Nous Portal / Anthropic 直 / ローカル LLM (llama_server_deb) を併用したい場合は
# ロール実行後に `hermes setup` か `hermes model` を対話実行して custom_providers
# セクションを追加する (本ロールは model: ブロックと OPENROUTER_API_KEY のみ管理)。

- block:

    - name: Install Hermes apt dependencies
      ansible.builtin.apt:
        name: "{{ hermes_agent_apt_deps }}"
        state: present
        update_cache: true
        cache_valid_time: 3600
      when: hermes_agent_install_apt_deps | bool

    - name: Look up home of hermes_agent_user
      ansible.builtin.getent:
        database: passwd
        key: "{{ hermes_agent_user }}"

    - name: Set fact for hermes_agent_user home
      ansible.builtin.set_fact:
        _hermes_agent_home: "{{ getent_passwd[hermes_agent_user][4] }}"

    - name: Run Hermes per-user installer (idempotent via creates)
      ansible.builtin.shell: |
        set -o pipefail
        curl -fsSL {{ hermes_agent_installer_url }} | bash
      args:
        executable: /bin/bash
        creates: "{{ _hermes_agent_home }}/.hermes/hermes-agent/venv/bin/hermes"
      become: true
      become_user: "{{ hermes_agent_user }}"
      environment:
        HOME: "{{ _hermes_agent_home }}"

    - name: Ensure ~/.hermes directory exists
      ansible.builtin.file:
        path: "{{ _hermes_agent_home }}/.hermes"
        state: directory
        owner: "{{ hermes_agent_user }}"
        group: "{{ hermes_agent_user }}"
        mode: "0755"

    # force の挙動:
    #   - 既定 (hermes_agent_reset_config=false): force:false で初回 bootstrap
    #     のみ。`hermes setup` / `hermes model` / `hermes config set` で加えた
    #     修正は再ロール実行で消えない。
    #   - hermes_agent_reset_config=true: force:true で強制上書き。テンプレ側を
    #     変えた直後 (openrouter_model 変更など) に反映したい時に使う。
    - name: Bootstrap ~/.hermes/config.yaml (force toggled by hermes_agent_reset_config)
      ansible.builtin.template:
        src: hermes-config.yaml.j2
        dest: "{{ _hermes_agent_home }}/.hermes/config.yaml"
        owner: "{{ hermes_agent_user }}"
        group: "{{ hermes_agent_user }}"
        mode: "0600"
        force: "{{ hermes_agent_reset_config | bool }}"
        backup: true

    # ~/.hermes/.env は Hermes の installer (postinstall) が空ファイルとして
    # 作らないケースがあるので、書き込み前に確実に存在させる。
    - name: Ensure ~/.hermes/.env exists with restrictive perms
      ansible.builtin.file:
        path: "{{ _hermes_agent_home }}/.hermes/.env"
        state: touch
        owner: "{{ hermes_agent_user }}"
        group: "{{ hermes_agent_user }}"
        mode: "0600"
        modification_time: preserve
        access_time: preserve

    # OPENROUTER_API_KEY は空文字列でなければ ~/.hermes/.env に書く。
    # no_log:true で Vault 展開後の値を Ansible ログに残さない。
    - name: Write OPENROUTER_API_KEY to ~/.hermes/.env
      ansible.builtin.lineinfile:
        path: "{{ _hermes_agent_home }}/.hermes/.env"
        regexp: '^OPENROUTER_API_KEY='
        line: "OPENROUTER_API_KEY={{ hermes_agent_openrouter_api_key }}"
        owner: "{{ hermes_agent_user }}"
        group: "{{ hermes_agent_user }}"
        mode: "0600"
        create: true
      no_log: true
      when: hermes_agent_openrouter_api_key | length > 0

    - name: Post-install reminders
      ansible.builtin.debug:
        msg:
          - "=== Hermes Agent 構築完了 (OpenRouter primary) ==="
          - "1. 動作確認: `hermes doctor` (→ docs/hermes.md)"
          - "2. モデル一覧: `hermes` 起動後に `/model` (OpenRouter picker)"
          - "3. 別 provider 追加は `hermes setup` / `hermes model` を対話実行"
          - "   (Nous Portal / Anthropic 直 / ローカル llama-server 等)"

  tags:
    - hermes_agent
  when:
    - ansible_facts['os_family'] == "Debian"
    - hermes_agent_enable | bool

# vim: set et ts=2 sw=2:
