---
# tasks file for roles/docker (native Ubuntu Docker Engine)

- block:
    - name: Install prerequisite packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: yes

    - name: Ensure apt keyrings directory exists
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Docker's official GPG key (signed-by keyring)
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'
        force: no

    - name: Add Docker apt repository
      apt_repository:
        repo: "deb [arch={{ ansible_architecture | replace('x86_64','amd64') | replace('aarch64','arm64') }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        filename: docker
        state: present
        update_cache: yes

    - name: Install Docker Engine and plugins
      apt:
        name: "{{ docker_packages }}"
        state: present
      vars:
        docker_packages: >-
          {{
            ['docker-ce', 'docker-ce-cli', 'containerd.io']
            + (['docker-compose-plugin'] if docker_install_compose_plugin else [])
            + (['docker-buildx-plugin'] if docker_install_buildx_plugin else [])
          }}
      notify: restart docker

    - name: Ensure Docker service is enabled and running
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add users to the docker group
      user:
        name: "{{ item }}"
        groups: docker
        append: yes
      loop: "{{ docker_users }}"
      when: docker_users | length > 0

    - name: Install shell aliases
      template:
        src: docker.sh.j2
        dest: /etc/profile.d/docker.sh
        mode: '0644'
  tags:
    - docker
