---
# tasks file for roles/japanese_fonts
- block:

  - name: install japanese font packages
    apt:
      name: "{{ japanese_fonts_packages }}"
      state: present
      update_cache: yes
      cache_valid_time: 3600
    notify: refresh fontconfig cache

  # OnlyOffice DesktopEditors は起動時に fontconfig 経由でシステムフォントを
  # 走査し、内部キャッシュ (AllFonts.js) を生成する。新しいフォントを
  # 認識させるためにはアプリを再起動する必要があり、稀にキャッシュが
  # 古いままになる場合は ~/.config/onlyoffice/DesktopEditors/data/fonts/
  # を削除すると次回起動時に再生成される。詳細は README 参照。

  tags:
    - japanese_fonts
