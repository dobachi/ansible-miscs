---
# tasks file for roles/rclone_sharepoint
#
# rclone mount で SharePoint を systemd 経由で常設マウントする。
# rclone_sharepoint_enable: true かつ Debian 系のときだけ動く。
#
# rclone は upstream の .deb で導入する (apt 同梱版は古く、SharePoint の
# list 周りに既知の問題があるため)。
# rclone.conf は対象ユーザーのホームに `rclone config` で作ったものを
# そのまま参照する (このロールは rclone.conf を生成も配布もしない)。
# systemd unit は User={{ rclone_sharepoint_user }} で走るため、
# トークンリフレッシュで rclone.conf の所有権が root に飛ぶことはない。

- block:

    - name: Install FUSE prerequisites
      ansible.builtin.apt:
        name:
          - fuse3
          - ca-certificates
        state: present
        update_cache: yes

    - name: Detect installed rclone version (if any)
      ansible.builtin.command: rclone version
      register: _rclone_installed
      changed_when: false
      failed_when: false

    - name: Decide whether upstream .deb needs to be (re)installed
      ansible.builtin.set_fact:
        _rclone_need_install: >-
          {{ _rclone_installed.rc != 0
             or (_rclone_installed.stdout_lines[0] | default('')
                  | regex_replace('^rclone v', '')
                  | regex_replace('-.*$', '')) != rclone_version }}

    - name: Download rclone .deb (upstream, only when version mismatches)
      ansible.builtin.get_url:
        url: "{{ rclone_release_base_url }}/v{{ rclone_version }}/rclone-v{{ rclone_version }}-linux-{{ rclone_deb_arch }}.deb"
        dest: "{{ rclone_deb_download_dir }}/rclone-v{{ rclone_version }}-linux-{{ rclone_deb_arch }}.deb"
        mode: "0644"
      when: _rclone_need_install

    - name: Install rclone .deb (replaces apt version if present)
      ansible.builtin.apt:
        deb: "{{ rclone_deb_download_dir }}/rclone-v{{ rclone_version }}-linux-{{ rclone_deb_arch }}.deb"
        state: present
      when: _rclone_need_install

    - name: Enable user_allow_other in /etc/fuse.conf (required for --allow-other)
      ansible.builtin.lineinfile:
        path: /etc/fuse.conf
        regexp: '^\s*#?\s*user_allow_other'
        line: "user_allow_other"
        state: present
        create: no

    - name: Look up home of mount-access user
      ansible.builtin.getent:
        database: passwd
        key: "{{ rclone_sharepoint_user }}"

    - name: Set facts (home / resolved rclone.conf path)
      ansible.builtin.set_fact:
        _rclone_sharepoint_home: "{{ getent_passwd[rclone_sharepoint_user][4] }}"

    - name: Resolve rclone.conf path
      ansible.builtin.set_fact:
        _rclone_sharepoint_config_path: >-
          {{ rclone_sharepoint_config_path
             if (rclone_sharepoint_config_path | default('') | trim) != ''
             else (_rclone_sharepoint_home ~ '/.config/rclone/rclone.conf') }}

    - name: Detect whether the mount point has any mount entry (alive or stale)
      ansible.builtin.shell: |
        set -e
        mount | awk '{print $3}' | grep -Fxq -- "{{ rclone_sharepoint_mountpoint }}"
      register: _rclone_sharepoint_mount_entry
      changed_when: false
      failed_when: false
      # `mountpoint -q` は FUSE デーモンが死んだ stale mount に対して rc=1 を
      # 返してしまうので、`mount` の 3 列目 (= 経路) を直接拾う方が確実。

    - name: Stop rclone-sharepoint.service (if alive) before touching the mount point
      ansible.builtin.systemd:
        name: "{{ rclone_sharepoint_service_name }}"
        state: stopped
      when: _rclone_sharepoint_mount_entry.rc == 0
      failed_when: false

    - name: Release any (stale or live) FUSE mount at the mount point
      ansible.builtin.shell: |
        set -u
        # まず正攻法 (FUSE デーモンと協調して片付ける)
        fusermount3 -u {{ rclone_sharepoint_mountpoint }} 2>/dev/null || true
        # まだ mount テーブルに残ってたら lazy umount で強制離脱
        # (Nautilus 等が file descriptor を掴んでるケースに対応)
        if mount | awk '{print $3}' | grep -Fxq -- "{{ rclone_sharepoint_mountpoint }}"; then
          umount -l {{ rclone_sharepoint_mountpoint }}
        fi
      changed_when: true
      when: _rclone_sharepoint_mount_entry.rc == 0

    - name: Ensure mount point directory exists (mkdir -p, idempotent)
      ansible.builtin.command: "mkdir -p {{ rclone_sharepoint_mountpoint }}"
      args:
        creates: "{{ rclone_sharepoint_mountpoint }}"
      # file: state=directory が FUSE マウント中のパスに対して
      # EEXIST で失敗するケースがあるため、command で回避。
      # 所有者の最終調整は systemd unit の ExecStartPre=+/bin/chown が担当。

    - name: Check whether rclone.conf with [{{ rclone_sharepoint_remote_name }}] is ready
      ansible.builtin.shell: |
        set -e
        test -r "{{ _rclone_sharepoint_config_path }}" \
          && grep -q '^\[{{ rclone_sharepoint_remote_name }}\]' \
                "{{ _rclone_sharepoint_config_path }}"
      register: _rclone_sharepoint_conf_check
      changed_when: false
      failed_when: false

    - name: Deploy systemd unit for rclone mount
      ansible.builtin.template:
        src: rclone-sharepoint.service.j2
        dest: "/etc/systemd/system/{{ rclone_sharepoint_service_name }}"
        owner: root
        group: root
        mode: "0644"
      register: _rclone_sharepoint_unit

    - name: Reload systemd if the unit changed
      ansible.builtin.systemd:
        daemon_reload: yes
      when: _rclone_sharepoint_unit is changed

    - name: Enable rclone-sharepoint.service
      ansible.builtin.systemd:
        name: "{{ rclone_sharepoint_service_name }}"
        enabled: yes

    - name: Start or restart rclone-sharepoint.service (rclone.conf ready)
      ansible.builtin.systemd:
        name: "{{ rclone_sharepoint_service_name }}"
        state: "{{ 'restarted' if _rclone_sharepoint_unit is changed else 'started' }}"
      when: _rclone_sharepoint_conf_check.rc == 0

    - name: First-time setup instructions (rclone.conf not yet configured)
      ansible.builtin.debug:
        msg: |
          rclone.conf に [{{ rclone_sharepoint_remote_name }}] remote が
          見つかりませんでした (探した場所: {{ _rclone_sharepoint_config_path }})。
          このホストで初回セットアップを完了するには:

            1. {{ rclone_sharepoint_user }} としてログイン
            2. `rclone config` を実行し、対話で次のように作成:
                 n) New remote
                 name        : {{ rclone_sharepoint_remote_name }}
                 storage     : onedrive
                 client_id / client_secret : 空のまま Enter
                 region      : 1 (Microsoft Cloud Global)
                 tenant      : 空のまま Enter
                 Edit advanced config : n
                 Use auto config : y  (ブラウザで MS 認証)
                 ↓ ブラウザ認証後、Type of connection を選択する画面で:
                 ★ 必ず項目名「Sharepoint site name or URL」(タグは
                   "(url)") を選ぶ。"Root Sharepoint site (sharepoint)" は
                   テナント直下の別ドライブを掴むので NG。
                 Site URL    : https://<tenant>.sharepoint.com/sites/<site>
                 ↓ ライブラリ一覧から目的の Documents (= Shared Documents) を選択
                 y) Yes this is OK
                 q) Quit
            3. `rclone lsf {{ rclone_sharepoint_remote_name }}:` でファイルが
               見えることを確認 (空なら drive 選択違い)
            4. `sudo systemctl start {{ rclone_sharepoint_service_name }}`

          サービスは既に enable 済みなので、rclone.conf を作った後は
          次回 boot からは自動マウントされます。
      when: _rclone_sharepoint_conf_check.rc != 0

  tags:
    - rclone_sharepoint
    - sharepoint
  when:
    - ansible_facts['os_family'] == "Debian"
    - rclone_sharepoint_enable | bool

# vim: set et ts=2 sw=2:
