---
# tasks file for roles/llama
#
# Download a prebuilt llama.cpp release into ~/Llama/{{ llama_version }}/.
# Backend-aware URL selection:
#   cpu    -> llama-<ver>-bin-ubuntu-x64.zip          (default; preserves prior behavior)
#   vulkan -> llama-<ver>-bin-ubuntu-vulkan-x64.zip   (AMD iGPU/dGPU via Mesa RADV)
#   rocm   -> not provided by upstream; fail with a pointer to the lemonade build

- block:
    - name: Validate llama_backend
      ansible.builtin.assert:
        that:
          - llama_backend in ['cpu', 'vulkan', 'rocm']
        fail_msg: "llama_backend must be one of: cpu, vulkan, rocm"

    - name: Reject rocm backend (no upstream prebuilt asset)
      ansible.builtin.fail:
        msg: >-
          llama_backend=rocm is not satisfied by upstream llama.cpp releases.
          For ROCm builds, use https://github.com/lemonade-sdk/llamacpp-rocm
          or build from source. This role only fetches official assets.
      when: llama_backend == 'rocm'

    - name: Build asset URL infix
      ansible.builtin.set_fact:
        _llama_asset: >-
          {{ 'llama-' ~ llama_version ~ '-bin-ubuntu-x64.zip'
             if llama_backend == 'cpu'
             else 'llama-' ~ llama_version ~ '-bin-ubuntu-' ~ llama_backend ~ '-x64.zip' }}

    - name: Install Vulkan runtime when backend == vulkan
      ansible.builtin.apt:
        name:
          - libvulkan1
          - mesa-vulkan-drivers
        state: present
        update_cache: true
      when: llama_backend == 'vulkan'

    - name: mkdir_Downloads
      ansible.builtin.file:
        path: "{{ ansible_home }}/Downloads"
        state: directory
        owner: "{{ ansible_facts['env']['SUDO_USER'] }}"
        group: "{{ ansible_facts['env']['SUDO_USER'] }}"

    - name: download package
      ansible.builtin.get_url:
        url: "https://github.com/ggml-org/llama.cpp/releases/download/{{ llama_version }}/{{ _llama_asset }}"
        dest: "{{ ansible_home }}/Downloads/{{ _llama_asset }}"
        owner: "{{ ansible_facts['env']['SUDO_USER'] }}"
        group: "{{ ansible_facts['env']['SUDO_USER'] }}"

    - name: mkdir_void
      ansible.builtin.file:
        path: "{{ ansible_home }}/Llama/{{ llama_version }}"
        state: directory
        owner: "{{ ansible_facts['env']['SUDO_USER'] }}"
        group: "{{ ansible_facts['env']['SUDO_USER'] }}"

    - name: unarchive_package
      ansible.builtin.unarchive:
        src: "{{ ansible_home }}/Downloads/{{ _llama_asset }}"
        dest: "{{ ansible_home }}/Llama/{{ llama_version }}"
        remote_src: yes
        owner: "{{ ansible_facts['env']['SUDO_USER'] }}"
        group: "{{ ansible_facts['env']['SUDO_USER'] }}"

    # The upstream prebuilt zips ship binaries with a RUNPATH baked in from the
    # GitHub Actions runner (/home/runner/work/llama.cpp/llama.cpp/build/bin),
    # which obviously doesn't exist on the end host. patchelf rewrites the
    # RUNPATH to $ORIGIN so each binary finds its sibling libs.
    - name: Install patchelf (to fix upstream RUNPATH)
      ansible.builtin.apt:
        name: patchelf
        state: present

    - name: Fix RUNPATH of llama.cpp binaries and libs ($ORIGIN)
      become: yes
      become_user: "{{ ansible_facts['env']['SUDO_USER'] }}"
      ansible.builtin.shell: |
        set -e
        cd "{{ ansible_home }}/Llama/{{ llama_version }}/build/bin"
        for f in llama-* lib*.so; do
          [ -f "$f" ] || continue
          patchelf --set-rpath '$ORIGIN' "$f"
        done
      args:
        executable: /bin/bash
      changed_when: true

    # ---- Optional llama-server systemd unit -----------------------------
    - block:
        - name: Validate llama_server_model_path is set when unit is enabled
          ansible.builtin.assert:
            that:
              - llama_server_model_path | length > 0
            fail_msg: >-
              llama_install_server_unit=true requires llama_server_model_path
              to point at a GGUF model file readable by the target user.

        - name: Deploy llama-server systemd unit
          ansible.builtin.template:
            src: llama-server.service.j2
            dest: /etc/systemd/system/llama-server.service
            owner: root
            group: root
            mode: "0644"

        - name: Reload systemd and enable llama-server
          ansible.builtin.systemd:
            name: llama-server
            daemon_reload: true
            enabled: true
            state: started
      when: llama_install_server_unit | bool
    # --------------------------------------------------------------------

  tags:
    - llama
