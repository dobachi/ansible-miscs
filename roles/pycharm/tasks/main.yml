---
# tasks file for roles/pycharm

- block:
  - name: install_zstd_for_extraction
    package:
      name: zstd
      state: present
    when: ansible_facts['os_family'] == "Debian" or ansible_facts['os_family'] == "RedHat"

  # Skip download / unarchive entirely when this version is already extracted.
  # Bumping pycharm_version (and pycharm_directory) is what triggers a fresh
  # install on the next run.
  - name: check_existing_pycharm_extraction
    stat:
      path: "{{ ansible_home }}/PyCharm/pycharm-{{ pycharm_directory }}"
    register: pycharm_extracted

  - name: mkdir_Downloads
    file:
      path: /home/{{ ansible_facts['env']['SUDO_USER'] }}/Downloads
      state: directory
      owner: "{{ ansible_facts['env']['SUDO_USER'] }}"
      group: "{{ ansible_facts['env']['SUDO_USER'] }}"
    when: not pycharm_extracted.stat.exists

  - name: downloads_tar
    get_url:
      url: https://download.jetbrains.com/python/pycharm-professional-{{ pycharm_version }}.tar.gz
      dest: /home/{{ ansible_facts['env']['SUDO_USER'] }}/Downloads/pycharm-professional-{{ pycharm_version }}.tar.gz
      owner: "{{ ansible_facts['env']['SUDO_USER'] }}"
      group: "{{ ansible_facts['env']['SUDO_USER'] }}"
      timeout: 300
    when: not pycharm_extracted.stat.exists

  - name: mkdir_pycharm
    file:
      path: /home/{{ ansible_facts['env']['SUDO_USER'] }}/PyCharm
      state: directory
      owner: "{{ ansible_facts['env']['SUDO_USER'] }}"
      group: "{{ ansible_facts['env']['SUDO_USER'] }}"
    when: not pycharm_extracted.stat.exists

  - name: unarchive_pycharm
    unarchive:
      src: /home/{{ ansible_facts['env']['SUDO_USER'] }}/Downloads/pycharm-professional-{{ pycharm_version }}.tar.gz
      dest: /home/{{ ansible_facts['env']['SUDO_USER'] }}/PyCharm
      remote_src: yes
      owner: "{{ ansible_facts['env']['SUDO_USER'] }}"
      group: "{{ ansible_facts['env']['SUDO_USER'] }}"
      creates: "{{ansible_home}}/PyCharm/pycharm-{{ pycharm_directory }}"
    when: not pycharm_extracted.stat.exists

  - name: configure_alternatives
    alternatives:
      name: pycharm
      path: "{{ansible_home}}/PyCharm/pycharm-{{ pycharm_directory }}/bin/pycharm"
      link: "{{ansible_home}}/.local/bin/pycharm"

  - name: copy_ideavimrc
    get_url:
      url: https://raw.githubusercontent.com/dobachi/ideavimrc/master/_ideavimrc
      dest: "{{ansible_home}}/.ideavimrc"
    become: no

  tags:
    - pycharm
