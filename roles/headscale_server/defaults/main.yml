---
# defaults file for roles/headscale_server

# Headscale upstream version (deb release tag without leading 'v')
headscale_version: "0.28.0"

# Architecture used in the deb filename. Auto-detected from ansible facts when
# left as the default sentinel; override explicitly to force a value.
headscale_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"

# Listen addresses. Defaults route all traffic through Caddy on the same host,
# so binding to localhost is intentional.
headscale_listen_addr: "127.0.0.1:8080"
headscale_metrics_listen_addr: "127.0.0.1:9090"
headscale_grpc_listen_addr: "127.0.0.1:50443"

# Tailnet address allocation (defaults to upstream Tailscale CGNAT range).
headscale_v4_prefix: "100.64.0.0/10"
headscale_v6_prefix: "fd7a:115c:a1e0::/48"
headscale_prefix_allocation: "sequential"

# DNS servers offered to clients via MagicDNS.
headscale_global_nameservers:
  - 1.1.1.1
  - 9.9.9.9
headscale_search_domains: []

# Built-in DERP (STUN) server. Off by default; rely on upstream DERP map.
headscale_derp_server_enabled: false

# Initial users to create after first install. Idempotent: already-existing
# names are a no-op.
headscale_users: []

# When true, the seeded ACL also permits Tailscale SSH between nodes
# (`tailscale up --ssh` on each client). Lets you SSH between tailnet hosts
# without managing per-host SSH keys -- auth happens against the headscale
# ACL instead. Set to false if you only want the L3 mesh.
headscale_acl_enable_ssh: true

# Local users on each node that Tailscale SSH may impersonate. The defaults
# cover root + every non-root login, which matches typical workstation use.
# Tighten if you have a strict separation of duties.
headscale_acl_ssh_users:
  - "root"
  - "autogroup:nonroot"

# SSH src / dst. Tailscale ACL v2 rejects `"*"` here -- only autogroups, user
# identifiers, groups, and tags are accepted.
#   autogroup:member -> any tailnet member
#   autogroup:self   -> only the source user's own devices
headscale_acl_ssh_src:
  - "autogroup:member"
headscale_acl_ssh_dst:
  - "autogroup:self"

# Required (no sensible default):
#   headscale_server_url        e.g. https://hs.example.com
#   headscale_base_domain       e.g. hs-net.example.com (must differ from
#                               server_url's domain)
