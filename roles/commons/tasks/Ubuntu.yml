---
# tasks file for roles/commons
- block:
  
  - name: install_common_packages
    apt:
      name:
        - curl
        - unzip
        - vim
        - openssl
        - jq
      state: present

  - name: update editor
    alternatives:
      name: editor
      path: /usr/bin/vim.basic

  - name: mkdir ./local/bin
    file:
      path: "{{ansible_home}}/.local/bin"
      state: directory
      owner: "{{ansible_facts['env']['SUDO_USER']}}"
      group: "{{ansible_facts['env']['SUDO_USER']}}"

  - name: add ./local/bin to PATH
    lineinfile:
      path: "{{ansible_home}}/.bashrc"
      state: present
      line: "export PATH=$PATH:~/.local/bin"

  # GDK_SCALE/GDK_DPI_SCALE はWayland+GNOMEのフラクショナルスケーリングと
  # 二重がけになりUIが巨大化するため廃止。スケーリングはGNOMEのディスプレイ設定に一本化する。
  # 既存マシンの .bashrc からも除去するため state: absent を残しておく。
  - name: remove legacy GDK_SCALE
    lineinfile:
      path: "{{ansible_home}}/.bashrc"
      state: absent
      line: "export GDK_SCALE=2"

  - name: remove legacy GDK_DPI_SCALE
    lineinfile:
      path: "{{ansible_home}}/.bashrc"
      state: absent
      line: "export GDK_DPI_SCALE=0.75"

  tags:
    - commons
