---
# Ubuntu 26.04 LTS (Resolute Raccoon) desktop setup playbook
#
# Bundles GUI + CUI keyboard customizations:
#   - Caps Lock <-> Ctrl swap (GNOME/Wayland + console)
#   - fcitx5 + mozc with Ctrl+Space as the IME trigger key
#   - kimpanel GNOME Shell extension so the fcitx5 candidate window / status
#     renders natively under Wayland (詳細は roles/gnome_kimpanel/README.md)
#   - Ctrl+Tab / Ctrl+Shift+Tab for next / previous tab on
#     gnome-terminal and Ptyxis
#   - CopyQ clipboard manager + Super+V (Win+V 相当) shortcut
#   - GNOME Shell 組み込みスクリーンショット UI を Super+Shift+S
#     (Win+Shift+S 相当) でも起動 (Print キー非搭載機向け)
#   - TeX Live (apt) for English/Japanese paper writing + TeXstudio editor
#     (詳細は roles/texlive/README.md と roles/texstudio/README.md)
#   - Quarto (upstream .deb) for scientific & technical publishing
#     (詳細は roles/quarto/README.md)
#   - OpenSpec (https://github.com/Fission-AI/OpenSpec) を npm -g で導入。
#     Node.js が古ければ NodeSource 22.x も合わせて入れる
#     (詳細は roles/openspec/README.md)
#   - rclone mount で SharePoint Online を /mnt/sharepoint に常設マウント
#     既定 disabled (rclone_sharepoint_enable: true を host_vars で立てた
#     ホストでのみ動く)。詳細は roles/rclone_sharepoint/README.md
#   - PDF tooling: Okular (注釈/フォーム), PDF Arranger (結合/分割),
#     qpdf / poppler-utils / ghostscript (CLI). 詳細は roles/pdf_tools/README.md
#   - 日本語フォント一式 (Noto CJK / IPA / IPAex / Takao など) を導入し、
#     OnlyOffice / LibreOffice / Inkscape などから利用可能にする
#     (詳細は roles/japanese_fonts/README.md)
#
# Plus the developer baseline rolled into basic.yml (commons/git/tmux/vim/...).
#
# Usage (no extra vars needed; the invoking user is auto-detected):
#   ansible-playbook -i hosts playbooks/conf/linux/ubu26_desktop.yml \
#     -e server=localhost --connection=local -K
#
# To force-switch from an existing IBus setup, additionally pass:
#   -e fcitx5_mozc_force_switch=true
#   -e fcitx5_mozc_purge_ibus_mozc=true   # only if you accept losing IBus-side Mozc data
#
# Common TeX overrides (see roles/texlive/defaults/main.yml for all knobs):
#   -e texlive_install_japanese=false           # 英語のみで軽くしたい
#   -e texlive_japanese_font_preset=ipaex       # 既定フォントを Noto から IPA へ

- hosts: "{{ server | default('localhost') }}"
  become: yes
  vars:
    # Auto-detect the invoking desktop user. With `become: yes` + `-K`, sudo
    # exports SUDO_USER to the task environment; ansible_facts.env.SUDO_USER
    # picks it up. Falls back to lookup('env', 'USER') for non-become runs.
    # `ansible_home` is set by the register_home role (must run first).
    fcitx5_mozc_user: "{{ ansible_facts.env.SUDO_USER | default(lookup('env', 'USER'), true) }}"
    fcitx5_mozc_user_home: >-
      {{ ansible_home
         | default('/home/' ~ (ansible_facts.env.SUDO_USER
                               | default(lookup('env','USER'), true)),
                   true) }}
    # kimpanel (GNOME 側の IME パネル) も同じデスクトップユーザへ適用する。
    gnome_kimpanel_user: "{{ fcitx5_mozc_user }}"
    gnome_kimpanel_user_home: "{{ fcitx5_mozc_user_home }}"
  roles:
    # ---- baseline (mirrors basic.yml) ----
    - register_home
    - commons
    - japanese_fonts
    - git
    - tmux
    - vim
    - vim_config
    - bash
    - pip3
    - pyenv
    # IDEs are optional for desktop. Comment out if you don't want them.
    - intellij
    - pycharm
    - goland

    # ---- Ubuntu 26 desktop add-ons ----
    - keyboard_swapcaps_gnome
    - fcitx5_mozc
    # kimpanel: fcitx5 の変換候補/状態を GNOME Shell パネルに描画 (Wayland 必須級)
    - gnome_kimpanel
    - gnome_terminal_tab_switch
    - copyq
    - gnome_screenshot_shortcut

    # ---- Paper / TeX environment ----
    - texlive
    - texstudio
    - quarto

    # ---- Spec-driven dev (OpenSpec CLI, npm -g) ----
    - openspec

    # ---- SharePoint Online mount (rclone + systemd, host_vars で有効化) ----
    - rclone_sharepoint

    # ---- PDF tooling (Okular + PDF Arranger + qpdf/poppler/ghostscript) ----
    - pdf_tools

    # ---- 日本語フォント (OnlyOffice / LibreOffice / Inkscape などで使用) ----
    # baseline ロール群の japanese_fonts で導入済みのため、ここでの再掲は不要。
    # 個別実行したい場合は `--tags japanese_fonts` を付与する。

# vim: et ts=2 sw=2:
