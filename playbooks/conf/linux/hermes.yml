---
# =====================================================================
# Hermes Agent (OpenRouter primary)
# =====================================================================
#
# 何を構築するか
# --------------
# Hermes Agent CLI を per-user で導入し、OpenRouter を primary provider
# として ~/.hermes/config.yaml と ~/.hermes/.env を bootstrap する。
#
# 方針
# ----
# Nous Research 自身が Hermes-3 / Hermes-4 を "NOT agentic" と警告して
# いる (hermes_cli/model_switch.py:53-58) ため、Hermes Agent 公式の一次
# 推奨に近い OpenRouter primary を標準構成とする。ローカル LLM
# (llama_server_deb + amdgpu_gtt) は非標準の実験用途として role 分離済み。
# 併用したい場合はロール実行後に `hermes setup` で custom endpoint を登録する。
#
# 構成
# ----
#   - register_home   : ansible_home 解決
#   - amdgpu_gtt      : (opt-in) GRUB に amdgpu.gttsize=N を追記
#   - llama_server_deb: (opt-in) llama.cpp-tools + Vulkan backend + systemd
#   - hermes_agent    : per-user インストーラ + ~/.hermes/config.yaml + .env
#
# 実行例
# ------
#   # 標準構成 (OpenRouter primary、ローカル LLM は使わない)
#   ansible-playbook -i hosts playbooks/conf/linux/hermes.yml \
#     -e server=k16 \
#     -e hermes_agent_enable=true \
#     --ask-vault-pass
#
#   # テンプレ変更を config.yaml に強制反映
#   ansible-playbook -i hosts playbooks/conf/linux/hermes.yml \
#     -e server=k16 \
#     -e hermes_agent_enable=true \
#     -e hermes_agent_reset_config=true \
#     --ask-vault-pass
#
# 実行後の手動ステップ
# --------------------
#   1. 動作確認:
#      - `hermes doctor`
#      - `hermes config show`
#      - `hermes`  (対話開始 → tool call 発火を確認)
#   2. 別 provider 追加 (Nous Portal / Anthropic 直 / ローカル LLM):
#      - `hermes setup` を対話実行
#      - or `hermes config set` で dotted-key 経由
# =====================================================================

- hosts: "{{ server | default('localhost') }}"
  become: true
  roles:
    - register_home
    - amdgpu_gtt
    - llama_server_deb
    - hermes_agent

