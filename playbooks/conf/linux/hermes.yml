---
# =====================================================================
# Hermes Agent (Docker sandboxed, OpenRouter primary)
# =====================================================================
#
# 何を構築するか
# --------------
# Hermes Agent CLI を **nousresearch/hermes-agent container** 版として
# per-user 導入する。ラッパースクリプト ~/.local/bin/hermes を配置し、
# 実行時に専用 workspace (~/hermes-workspace) と ~/.hermes を bind mount
# した状態で docker run を発火する。
#
# 隔離モデル
# ----------
#   [Host]                                 [container: nousresearch/hermes-agent]
#   ~/hermes-workspace  ── bind mount ──→  /workspace  (WORKDIR)
#   ~/.hermes           ── bind mount ──→  /opt/data   (config, API key, sessions)
#
# file tool も terminal tool も上記 2 ディレクトリの外を触れない。
# $HOME/.ssh, /etc/passwd 等は container からは存在しない扱い。
#
# 触らせたいファイルは workspace にコピー / clone してから hermes を起動する。
#
# 構成ロール
# ----------
#   - register_home  : ansible_home 解決
#   - docker         : Docker CE + docker group で dobachi 追加
#   - hermes_agent   : image pull + wrapper + workspace + ~/.hermes bootstrap
#
# 実行例
# ------
#   # 標準構成 (Docker sandboxed, OpenRouter primary)
#   ansible-playbook -i hosts playbooks/conf/linux/hermes.yml \
#     -e server=k16 \
#     -e hermes_agent_enable=true \
#     --ask-vault-pass
#
#   # テンプレ変更を config.yaml に強制反映したい場合
#   ansible-playbook -i hosts playbooks/conf/linux/hermes.yml \
#     -e server=k16 \
#     -e hermes_agent_enable=true \
#     -e hermes_agent_reset_config=true \
#     --ask-vault-pass
#
# 実行後の手動ステップ
# --------------------
#   1. docker group 反映: `newgrp docker` (or 一度ログアウト)
#   2. PATH 確認: `command -v hermes` が ~/.local/bin/hermes を指す
#   3. 動作確認: `hermes doctor`
#   4. 触らせたいファイルを workspace に配置:
#      cp -r ~/some-project ~/hermes-workspace/  (または `git clone` する)
#   5. `hermes` で対話開始
# =====================================================================

- hosts: "{{ server | default('localhost') }}"
  become: true
  roles:
    - register_home
    - docker
    - hermes_agent

