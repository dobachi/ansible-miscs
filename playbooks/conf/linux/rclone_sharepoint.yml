---
# SharePoint Online のドキュメントライブラリを rclone + systemd で
# /mnt/sharepoint (既定) に常設マウントする。
#
# k16 単体で完結する設計。手順:
#   1. host_vars/<host>/main.yml で rclone_sharepoint_enable: true を立てる
#   2. この playbook を実行 → rclone / fuse3 / systemd unit を設置
#   3. 対象ホストにログインして `rclone config` で [sharepoint] remote を作る
#      (詳細は roles/rclone_sharepoint/README.md)
#   4. `sudo systemctl start rclone-sharepoint.service`
#
# 実行例:
#   # k16 (home_desktops, ローカル接続) にだけ適用
#   ansible-playbook -i hosts playbooks/conf/linux/rclone_sharepoint.yml \
#     -e server=home_desktops
#
#   # 任意のホスト
#   ansible-playbook -i hosts playbooks/conf/linux/rclone_sharepoint.yml \
#     -e server=localhost --connection=local
#
# rclone_sharepoint_enable: false (既定) なホストでは何も起きない。

- hosts: "{{ server | default('localhost') }}"
  become: yes
  roles:
    - rclone_sharepoint

